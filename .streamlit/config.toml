# Base theme — the first paint, before any runtime CSS injects.
# The in-app toggle (see ui.py) restyles from here; this only has to make the
# initial frame look intentional instead of default-grey. Dark by default to
# match the app's primary look.
[theme]
base = "dark"
primaryColor = "#7c5cff"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161a23"
textColor = "#e6e9ef"
font = "sans serif"
